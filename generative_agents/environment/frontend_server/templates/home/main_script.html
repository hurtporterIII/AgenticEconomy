	function personaRoleKey(name) {
		let n = (name || "").toLowerCase();
		if (n.startsWith("worker")) return "worker";
		if (n.startsWith("cop")) return "cop";
		if (n.startsWith("spy")) return "spy";
		if (n.startsWith("banker")) return "banker";
		if (n.startsWith("bank")) return "bank";
		if (n.startsWith("thief")) return "thief";
		return "other";
	}
	function chooseVisiblePersonas(allNames, maxCount) {
		let buckets = { worker: [], cop: [], banker: [], spy: [], bank: [], thief: [], other: [] };
		allNames.forEach(function(name){ buckets[personaRoleKey(name)].push(name); });
		let picks = [];
		function take(bucket, count) {
			for (let i = 0; i < count && buckets[bucket].length > 0 && picks.length < maxCount; i++) {
				picks.push(buckets[bucket].shift());
			}
		}
		// Demo-first lineup: 2 workers + 1 cop + 1 banker + 1 spy + 1 thief.
		take("worker", 2);
		take("cop", 1);
		take("banker", 1);
		take("spy", 1);
		take("thief", 1);
		["worker", "cop", "banker", "spy", "bank", "thief", "other"].forEach(function(bucket){
			while (buckets[bucket].length > 0 && picks.length < maxCount) picks.push(buckets[bucket].shift());
		});
		return picks;
	}

	function formatBridgeMoney(value) {
		let n = Number(value || 0);
		if (!Number.isFinite(n)) n = 0;
		return n.toFixed(6);
	}

	function summarizeBridgeRecent(recent) {
		if (!Array.isArray(recent) || recent.length === 0) return "None";
		const lines = recent.slice(-5).map(function(ev){
			if (typeof ev === "string") return ev;
			if (!ev || typeof ev !== "object") return "";
			if (ev.summary) return String(ev.summary);
			const t = String(ev.type || "event");
			const amount = (ev.amount !== undefined && ev.amount !== null) ? Number(ev.amount || 0).toFixed(6) : null;
			return amount !== null ? (t + " " + amount) : t;
		}).filter(Boolean);
		return lines.length ? lines.map(function(l){ return "- " + l; }).join("<br>") : "None";
	}

	function updateBankPanelFromPersona(personaPayload) {
		let rowsEl = document.getElementById("bank_panel_rows");
		if (!rowsEl) return;
		let entries = [];
		let workerWalletTotal = 0;
		let copWalletTotal = 0;
		let storedTotal = 0;
		Object.keys(personaPayload || {}).forEach(function(name){
			let p = personaPayload[name] || {};
			let role = String(p["role"] || "").toLowerCase();
			if (role !== "worker" && role !== "cop") return;
			let balance = Number(p["balance"] || 0);
			let stored = Number(p["home_storage"] || 0);
			let collected = Number(p["lifetime_collected"] || 0);
			let lost = Number(p["lifetime_lost"] || 0);
			let net = Number(p["lifetime_net"]);
			if (!Number.isFinite(net)) net = collected - lost;
			if (role === "worker") workerWalletTotal += balance;
			if (role === "cop") copWalletTotal += balance;
			storedTotal += stored;
			entries.push({
				name: name,
				role: roleTitleFromPayloadRole(role),
				balance: balance,
				stored: stored,
				collected: collected,
				lost: lost,
				net: net,
				action: String(p["current_action"] || "idle")
			});
		});
		entries.sort(function(a, b){ return a.name.localeCompare(b.name); });
		if (!entries.length) {
			rowsEl.innerHTML = "<tr><td colspan='8'>No worker/cop rows yet.</td></tr>";
		} else {
			rowsEl.innerHTML = entries.map(function(r){
				return "<tr>"
					+ "<td>" + r.name + "</td>"
					+ "<td>" + r.role + "</td>"
					+ "<td>" + formatBridgeMoney(r.balance) + "</td>"
					+ "<td>" + formatBridgeMoney(r.stored) + "</td>"
					+ "<td>" + formatBridgeMoney(r.collected) + "</td>"
					+ "<td>" + formatBridgeMoney(r.lost) + "</td>"
					+ "<td>" + formatBridgeMoney(r.net) + "</td>"
					+ "<td>" + r.action + "</td>"
					+ "</tr>";
			}).join("");
		}
		let workersEl = document.getElementById("bank_virtual_workers");
		if (workersEl) workersEl.innerHTML = formatBridgeMoney(workerWalletTotal);
		let copsEl = document.getElementById("bank_virtual_cops");
		if (copsEl) copsEl.innerHTML = formatBridgeMoney(copWalletTotal);
		let storedEl = document.getElementById("bank_virtual_stored");
		if (storedEl) storedEl.innerHTML = formatBridgeMoney(storedTotal);
	}

		let rw2 = document.getElementById("bank_real_wallet_2");

		let drips = diagnostics["last_native_drip_targets"];

		if (dripsEl) dripsEl.innerHTML = Array.isArray(drips) && drips.length ? drips.join(" | ") : "-";
	}

	function pollBankTxDiagnosticsIfNeeded(forceNow) {
		if (!bridge_mode) return;
		if (!forceNow && bank_diag_poll_countdown > 0) {
			bank_diag_poll_countdown -= 1;
			return;
		}
		bank_diag_poll_countdown = 8;
		let req = new XMLHttpRequest();
		req.overrideMimeType("application/json");
		req.open("GET", "{% url 'bridge_tx_diagnostics' %}", true);
		req.addEventListener("load", function() {
			if (req.status !== 200) return;
			try {
				let payload = JSON.parse(req.responseText || "{}");
				if (payload && payload.ok) updateBankTxDiagnosticsCard(payload);
			} catch (e) {}
		});
		req.send();
	}

	function bridge_tile_present(layer, tx, ty) {
		if (!layer) return false;
		let t = layer.getTileAt(tx, ty, false);
		return !!(t && t.index !== -1);
	}

	function bridge_is_door_tile(tx, ty) {
		if (!bridge_wall_layer) return false;
		let wallTile = bridge_wall_layer.getTileAt(tx, ty, false);
		if (!wallTile || wallTile.index === -1) return false;

		let hasInterior = false;
		let hasExterior = false;
		let neighbors = [[tx + 1, ty], [tx - 1, ty], [tx, ty + 1], [tx, ty - 1]];
		for (let i = 0; i < neighbors.length; i++) {
			let nx = neighbors[i][0], ny = neighbors[i][1];
			if (nx < 0 || ny < 0 || nx >= bridge_map_width_tiles || ny >= bridge_map_height_tiles) continue;
			if (bridge_tile_present(bridge_interior_ground_layer, nx, ny)) hasInterior = true;
			if (bridge_tile_present(bridge_exterior_ground_layer, nx, ny)) hasExterior = true;
		}
		return hasInterior && hasExterior;
	}

	function bridge_tile_blocked(x, y) {
		let tx = Math.floor(x / tile_width);
		let ty = Math.floor(y / tile_width);
		if (tx < 0 || ty < 0 || tx >= bridge_map_width_tiles || ty >= bridge_map_height_tiles) return true;
		// Collisions layer is the single source of truth for impassable geometry.
		// Walls on the Wall layer are NOT treated as blockers by themselves — many
		// wall tiles are actually doorways that must be walkable. If you need
		// extra wall rigidity for a specific layer, add it here with a door
		// exception using bridge_is_door_tile(tx, ty).
		let collisionsLayer = bridge_block_layers[0];
		if (collisionsLayer) {
			let tile = collisionsLayer.getTileAt(tx, ty, false);
			if (tile && tile.collides) return true;
		}
		return false;
	}

	function bridge_can_occupy(x, y) {
		let checks = [
			[x, y],
			[x - bridge_body_half_w, y],
			[x + bridge_body_half_w, y],
			[x, y - bridge_body_half_h],
			[x, y + bridge_body_half_h],
			[x - bridge_body_half_w, y - bridge_body_half_h],
			[x + bridge_body_half_w, y - bridge_body_half_h],
			[x - bridge_body_half_w, y + bridge_body_half_h],
			[x + bridge_body_half_w, y + bridge_body_half_h]
		];
		for (let i = 0; i < checks.length; i++) {
			if (bridge_tile_blocked(checks[i][0], checks[i][1])) return false;
		}
		return true;
	}

	function bridge_world_to_tile(x, y) { return [Math.floor(x / tile_width), Math.floor(y / tile_width)]; }
	function bridge_tile_to_world(tx, ty) { return [tx * tile_width + (tile_width / 2), ty * tile_width + (tile_width / 2)]; }
	function bridge_tile_key(tx, ty) { return tx + "," + ty; }

	function bridge_add_building_labels(scene) {
		if (!bridge_mode || !bridge_show_building_labels) return;
		for (let i = 0; i < bridge_building_labels.length; i++) {
			let b = bridge_building_labels[i];
			let wx = (b.tx * tile_width) + (tile_width / 2);
			let wy = (b.ty * tile_width) + (tile_width / 2) - 20;
			scene.add.text(wx, wy, b.id + " " + b.name, {

				stroke: "#ffffff",
				strokeThickness: 1,
				padding: { x: 6, y: 3 }
			}).setDepth(900).setOrigin(0.5, 0.5);
		}
	}

	function bridge_find_nearest_walkable(tx, ty, maxRadius) {
		if (!bridge_tile_blocked(tx * tile_width + 1, ty * tile_width + 1)) return [tx, ty];
		for (let r = 1; r <= maxRadius; r++) {
			for (let dx = -r; dx <= r; dx++) {
				for (let dy = -r; dy <= r; dy++) {
					if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
					let nx = tx + dx;
					let ny = ty + dy;
					if (nx < 0 || ny < 0 || nx >= bridge_map_width_tiles || ny >= bridge_map_height_tiles) continue;
					if (!bridge_tile_blocked(nx * tile_width + 1, ny * tile_width + 1)) return [nx, ny];
				}
			}
		}
		return [tx, ty];
	}

	function bridge_astar_path(startX, startY, goalX, goalY) {
		let start = bridge_find_nearest_walkable(startX, startY, 2);
		let goal = bridge_find_nearest_walkable(goalX, goalY, 8);
		let startKey = bridge_tile_key(start[0], start[1]);
		let goalKey = bridge_tile_key(goal[0], goal[1]);
		if (startKey === goalKey) return [];
		let open = [start], cameFrom = {}, gScore = {}, fScore = {};
		gScore[startKey] = 0;
		fScore[startKey] = Math.abs(start[0] - goal[0]) + Math.abs(start[1] - goal[1]);
		let visited = 0, maxNodes = 5000;
		while (open.length > 0 && visited < maxNodes) {
			visited += 1;
			let bestIdx = 0, bestKey = bridge_tile_key(open[0][0], open[0][1]);
			let bestF = fScore[bestKey] ?? Number.POSITIVE_INFINITY;
			for (let i = 1; i < open.length; i++) {
				let k = bridge_tile_key(open[i][0], open[i][1]);
				let f = fScore[k] ?? Number.POSITIVE_INFINITY;
				if (f < bestF) { bestF = f; bestIdx = i; bestKey = k; }
			}
			let current = open.splice(bestIdx, 1)[0];
			let cx = current[0], cy = current[1], cKey = bridge_tile_key(cx, cy);
			if (cKey === goalKey) {
				let path = [], walk = cKey;
				while (walk && walk !== startKey) {
					let p = walk.split(",");
					path.unshift([parseInt(p[0]), parseInt(p[1])]);
					walk = cameFrom[walk];
				}
				return path;
			}
			let neighbors = [[cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]];
			for (let i = 0; i < neighbors.length; i++) {
				let nx = neighbors[i][0], ny = neighbors[i][1];
				if (nx < 0 || ny < 0 || nx >= bridge_map_width_tiles || ny >= bridge_map_height_tiles) continue;
				if (bridge_tile_blocked(nx * tile_width + 1, ny * tile_width + 1)) continue;
				let nKey = bridge_tile_key(nx, ny);
				let tentative = (gScore[cKey] ?? Number.POSITIVE_INFINITY) + 1;
				if (tentative < (gScore[nKey] ?? Number.POSITIVE_INFINITY)) {
					cameFrom[nKey] = cKey;
					gScore[nKey] = tentative;
					fScore[nKey] = tentative + Math.abs(nx - goal[0]) + Math.abs(ny - goal[1]);
					let inOpen = false;
					for (let j = 0; j < open.length; j++) if (open[j][0] === nx && open[j][1] === ny) { inOpen = true; break; }
					if (!inOpen) open.push([nx, ny]);
				}
			}
		}
		return [];
	}

	function bridge_recompute_path(personaName, fromX, fromY, goalX, goalY) {
		let now = performance.now();
		let last = bridge_last_path_update_ms[personaName] || 0;
		let prevG = bridge_last_repath_goal[personaName];
		let goalJump = false;
		if (prevG && prevG.length >= 2) {
			goalJump = Math.hypot(goalX - prevG[0], goalY - prevG[1]) > 52;
		}
		bridge_last_repath_goal[personaName] = [goalX, goalY];
		if (!goalJump && (now - last) < bridge_repath_interval_ms && bridge_paths[personaName] && bridge_paths[personaName].length > 0) return;
		let fromTile = bridge_world_to_tile(fromX, fromY);
		let goalTile = bridge_world_to_tile(goalX, goalY);
		let tilePath = bridge_astar_path(fromTile[0], fromTile[1], goalTile[0], goalTile[1]);
		let worldPath = [];
		for (let i = 0; i < tilePath.length; i++) worldPath.push(bridge_tile_to_world(tilePath[i][0], tilePath[i][1]));
		bridge_paths[personaName] = worldPath;
		bridge_last_path_update_ms[personaName] = now;
	}

	// Joon: Phaser 3.0 is oriented around "scenes" -- recall how Pokemon plays: 
	//       there is the outdoor space, and then there is the indoor space; when
	//       you go inside, you transition to a new "scene" and the outdoor space
	//       basically disappears. 
	//       A scene in Phaser has four key methods that are called at different
	//       stages of rendering for different purposes. They are: 
	//       init() -> preload() -> create() -> update()
	//         init() is called only once at the very beginning. This is the 
	//           initialization function in case that is needed. 
	//         preload() is called once and preloads any of the assets
	//         create() is also called once after preloading... creates sprites 
	//           and actually displays stuff
	//         update() is called on each frame during the game play 

	function preload() {
	  var load = this.load;
	  load.once("loaderror", function (file) {
	    console.error("[Phaser loaderror]", file && file.key, file && file.url);
	    var el = document.getElementById("game-container");
	    if (el && !el.dataset.aeLoaderr) {
	      el.dataset.aeLoaderr = "1";
	      el.insertAdjacentHTML("beforeend", "<p style=\"color:#a00;padding:12px;font:14px monospace\">Map or sprite asset failed to load (check Network tab). Key: " + String(file && file.key) + "</p>");
	    }
	  });
	  // Loading the necessary images (e.g., the background image, character 
	  // sprites). 

	  // Joon: for load.image, the first parameter is simply the key value that
	  //       you are passing in. The second parameter should be pointed to the
	  //       png file that contains the tileset. 
	  //       Also IMPORTANT: when you create a tileset in Tiled, always be  
	  //       sure to check the "embedded" option. 
	  this.load.image("blocks_1", "{% static 'assets/the_ville/visuals/map_assets/blocks/blocks_1.png' %}");
	  this.load.image("walls", "{% static 'assets/the_ville/visuals/map_assets/v1/Room_Builder_32x32.png' %}");
	  this.load.image("interiors_pt1", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt1.png' %}");
	  this.load.image("interiors_pt2", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt2.png' %}");
	  this.load.image("interiors_pt3", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt3.png' %}");
	  this.load.image("interiors_pt4", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt4.png' %}");
	  this.load.image("interiors_pt5", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt5.png' %}");
	  this.load.image("CuteRPG_Field_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_B.png' %}");
	  this.load.image("CuteRPG_Field_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_C.png' %}");
	  this.load.image("CuteRPG_Harbor_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Harbor_C.png' %}");
	  this.load.image("CuteRPG_Village_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Village_B.png' %}");
	  this.load.image("CuteRPG_Forest_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_B.png' %}");
	  this.load.image("CuteRPG_Desert_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_C.png' %}");
	  this.load.image("CuteRPG_Mountains_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Mountains_B.png' %}");
	  this.load.image("CuteRPG_Desert_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_B.png' %}");
	  this.load.image("CuteRPG_Forest_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_C.png' %}");

	  // Joon: This is the export json file you get from Tiled. 
	  this.load.tilemapTiledJSON("map", "{% static 'assets/the_ville/visuals/the_ville_jan7.json' %}");

	  // An atlas is a way to pack multiple images together into one texture. I'm 
	  // using it to load all the player animations (walking left, walking right, 
	  // etc.) in one image. For more info see:
	  // https://labs.phaser.io/view.html?src=src/animation/texture%20atlas%20animation.js
	  // If you don't use an atlas, you can do the same thing with a spritesheet, 
	  // see: https://labs.phaser.io/view.html?src=src/animation/single%20sprite%20sheet.js
	  // Joon: Technically, I think this guy had the best tutorial for atlas: 
	  //       https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  // jsDelivr mirror: GitHub Pages is often blocked on school/corp networks.
	  this.load.atlas("atlas",
	                  "{% static 'assets/characters/Adam_Smith.png' %}",
	                  "{% static 'assets/characters/atlas_misa.json' %}");
	}

	  const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
	  const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);
	  foregroundL1Layer.setDepth(2);
	  foregroundL2Layer.setDepth(2);

	  const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
	  bridge_collision_layer = collisionsLayer;

	  // Structural blocking only (stable baseline).

	  bridge_block_layers = [

	  // const groundLayer = map.createLayer("Ground", walls, 0, 0);

	  // const foregroundLayer = map.createLayer("Foreground", interiors, 0, 0);

	  // Joon : This is where you want to create a custom field for the tileset
	  //        in Tiled. Take a look at this guy's tutorial: 
	  //        https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	  collisionsLayer.setCollisionByProperty({ collide: true });
	  // By default, everything gets depth sorted on the screen in the order we 
	  // created things. Here, we want the "Above Player" layer to sit on top of 
	  // the player, so we explicitly give it a depth. Higher depths will sit on 
	  // top of lower depth objects.
	  // Collisions layer should get a negative depth since we do not want to see

	  collisionsLayer.setDepth(-1);
	  // foregroundL1Layer.setDepth(2);
	  // foregroundL1Layer.setDepth(2);

	  // *** SET UP CAMERA *** 
	  // "player" is to be set as the center of mass for our "camera." We 
	  // basically create a game character sprite as we would for our personas 
	  // but we move it to depth -1 and let it pass through the collision map;  
	  // that is, do not have the following line: 
	  // this.physics.add.collider(player, collisionsLayer);
	  // OLD NOTE: Create a sprite with physics enabled via the physics system. 
	  // The image  used for the sprite has a bit of whitespace, so I'm using

	  player = this.physics.add.

	  // Setting up the camera. 
	  const camera = this.cameras.main;

	  camera.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
	  cursors = this.input.keyboard.createCursorKeys();

	  // *** SET UP PERSONAS *** 
	  // We start by creating the game sprite objects. 
	  for (let i=0; i<Object.keys(spawn_tile_loc).length; i++) {

	                         .setSize(30, 40)
	                         .setOffset(0, 32); // DEBUG 1 --- I added 32 offset on Dec 29.

	    personas[persona_name] = new_sprite;
	    bridge_target[persona_name] = [new_sprite.x, new_sprite.y];
	    bridge_destination[persona_name] = [new_sprite.x, new_sprite.y];

	    bridge_last_sprite_xy[persona_name] = [new_sprite.x, new_sprite.y];
	    pronunciatios[persona_name] = this.add.text(
	                                   new_sprite.x - 6, 
	                                   new_sprite.y - 42 - 32, // DEBUG 1 --- I added 32 offset on Dec 29. 
	                                   "🦁", {
	                                   font: "28px monospace", 
	                                   fill: "#000000", 
	                                   padding: { x: 8, y: 8}, 
	                                   backgroundColor: "#ffffff",
	                                   border:"solid",
	                                   borderRadius:"10px"}).setDepth(3);
	    role_titles[persona_name] = this.add.text(
	                                  new_sprite.x,

	    if (bridge_mode) {

	function update(time, delta) {
		// *** SETUP PLAY AND PAUSE BUTTON *** 
		let play_context = this;
		function game_resume() {  
			play_context.scene.resume();
		}  
		play_button.onclick = function(){
			game_resume();
		};
		function game_pause() {  
			play_context.scene.pause();
		}  
		pause_button.onclick = function(){
			game_pause();
		};

	  // *** MOVE CAMERA *** 
	  // This is where we finish up the camera setting we started in the create() 
	  // function. We set the movement speed of the camera and wire up the keys to
	  // map to the actual movement.
	  const camera_speed = 400;
	  // Stop any previous movement from the last frame
	  player.body.setVelocity(0);
	  if (cursors.left.isDown) {
	    player.body.setVelocityX(-camera_speed);
	  } 
	  if (cursors.right.isDown) {
	    player.body.setVelocityX(camera_speed);
	  } 
	  if (cursors.up.isDown) {
	    player.body.setVelocityY(-camera_speed);
	  } 
	  if (cursors.down.isDown) {
	    player.body.setVelocityY(camera_speed);
	  }

	  if (bridge_mode) {
	  	if (timer <= 0) {
	      var bridge_xobj = new XMLHttpRequest();
	      bridge_xobj.overrideMimeType("application/json");
	      bridge_xobj.open('POST', "{% url 'update_environment' %}", true);
	      bridge_xobj.addEventListener("load", function() {
	        if (this.readyState === 4 && bridge_xobj.status === 200) {
	          let payload = JSON.parse(bridge_xobj.responseText);
	          if (payload["meta"] && payload["meta"]["curr_time"]) {
	          	document.getElementById("game-time-content").innerHTML = payload["meta"]["curr_time"];
	          }
	          if (payload["persona"]) {
	          	for (let i=0; i<Object.keys(personas).length; i++) {
	          		let curr_persona_name = Object.keys(personas)[i];
	          		let curr_persona_name_os = curr_persona_name.replace(/ /g,"_");
	          		let p = payload["persona"][curr_persona_name];
	          		if (!p) continue;
	          		let tx = p["movement"][0], ty = p["movement"][1];
	          		let dzx = (p["dest_x"] !== undefined) ? p["dest_x"] : tx;
	          		let dzy = (p["dest_y"] !== undefined) ? p["dest_y"] : ty;
	          		let nowMs = performance.now();
	          		let prevMs = bridge_last_update_ms[curr_persona_name] || (nowMs - 100.0);
	          		let prevTargetForBlend = bridge_target[curr_persona_name] || [tx, ty];
	          		bridge_destination[curr_persona_name] = [dzx, dzy];
	          		let dtMs = Math.max(16.0, nowMs - prevMs);
	          		bridge_velocity[curr_persona_name] = [
	          			(tx - prevTargetForBlend[0]) / dtMs,
	          			(ty - prevTargetForBlend[1]) / dtMs
	          		];
	          		// Authoritative server pixels (same as FastAPI actor x/y via Django movement[]).
	          		bridge_target[curr_persona_name] = [tx, ty];
	          		bridge_last_update_ms[curr_persona_name] = nowMs;
	          		let sh = (p["shift"] !== undefined && p["shift"] !== null && String(p["shift"]).length) ? String(p["shift"]) : "";
	          		let wr = (p["work_route"] !== undefined && p["work_route"] !== null && String(p["work_route"]).length) ? String(p["work_route"]) : "";
	          		let srvLine = "srv " + tx + "," + ty + " -> " + dzx + "," + dzy + (sh ? " [" + sh + "]" : "") + (wr ? " r:" + wr : "");
	          		bridge_last_srv_line[curr_persona_name] = srvLine;
	          		if (bridge_trace_labels[curr_persona_name]) {
	          			let spr = personas[curr_persona_name];
	          			let ex = spr ? Math.round(spr.x) : 0, ey = spr ? Math.round(spr.y) : 0;
	          			let err = spr ? Math.round(Math.hypot(spr.x - dzx, spr.y - dzy)) : 0;
	          			bridge_trace_labels[curr_persona_name].setText(srvLine + "\ncli " + ex + "," + ey + " err " + err);
	          		}
	          		let role_content = roleTitleFromPayloadRole(p["role"] || "");
	          		pronunciatios[curr_persona_name].setText(role_content || roleTitleFromName(curr_persona_name));
	          		if (role_titles[curr_persona_name]) {
	          			role_titles[curr_persona_name].setText(role_content);
	          		}
	          		let roleEl = document.getElementById("role__"+curr_persona_name_os);
	          		if (roleEl) roleEl.innerHTML = role_content || "Agent";
	          		let copStatsWrap = document.getElementById("cop_stats__"+curr_persona_name_os);
	          		let isCopRole = String((p["role"] || "")).toLowerCase() === "cop";
	          		if (copStatsWrap) copStatsWrap.style.display = isCopRole ? "block" : "none";
	          		if (isCopRole) {
	          			let cs = p["cop_stats"] || {};
	          			let catchesEl = document.getElementById("cop_catches__"+curr_persona_name_os);
	          			if (catchesEl) catchesEl.innerHTML = String(cs["catches"] || 0);
	          			let takenEl = document.getElementById("cop_taken__"+curr_persona_name_os);
	          			if (takenEl) takenEl.innerHTML = formatBridgeMoney(cs["total_taken_from_thief"] || 0);
	          			let confCountEl = document.getElementById("cop_bank_conf_count__"+curr_persona_name_os);
	          			if (confCountEl) confCountEl.innerHTML = String(cs["bank_confiscations_count"] || 0);
	          			let confTotalEl = document.getElementById("cop_bank_conf_total__"+curr_persona_name_os);
	          			if (confTotalEl) confTotalEl.innerHTML = formatBridgeMoney(cs["bank_confiscations_total"] || 0);
	          		}
	          		let description_content = p["description"] || "idle@home";
	          		let split_desc = description_content.split("@");
	          		document.getElementById("current_action__"+curr_persona_name_os).innerHTML = p["current_action"] || split_desc[0] || "idle";
	          		let balEl = document.getElementById("balance__"+curr_persona_name_os);
	          		if (balEl) balEl.innerHTML = formatBridgeMoney(p["balance"]);
	          		let homeEl = document.getElementById("home_storage__"+curr_persona_name_os);
	          		if (homeEl) homeEl.innerHTML = formatBridgeMoney(p["home_storage"]);
	          		let lcEl = document.getElementById("lifetime_collected__"+curr_persona_name_os);
	          		if (lcEl) lcEl.innerHTML = formatBridgeMoney((p["lifetime_collected"] !== undefined && p["lifetime_collected"] !== null) ? p["lifetime_collected"] : 0);
	          		let llEl = document.getElementById("lifetime_lost__"+curr_persona_name_os);
	          		if (llEl) llEl.innerHTML = formatBridgeMoney((p["lifetime_lost"] !== undefined && p["lifetime_lost"] !== null) ? p["lifetime_lost"] : 0);
	          		let lnEl = document.getElementById("lifetime_net__"+curr_persona_name_os);
	          		if (lnEl) {
	          			let lnv = p["lifetime_net"];
	          			if (lnv === undefined || lnv === null) {
	          				lnv = Number(p["lifetime_collected"] || 0) - Number(p["lifetime_lost"] || 0);
	          			}
	          			lnEl.innerHTML = formatBridgeMoney(lnv);
	          		}
	          		let flowEl = document.getElementById("flow__"+curr_persona_name_os);
	          		if (flowEl) flowEl.innerHTML = String(p["flow"] || "No recent financial flow");
	          		let recentRows = Array.isArray(p["recent"]) ? p["recent"] : [];
	          		let hasBankPenalty = recentRows.some(function(ev){
	          			return ev && typeof ev === "object" && ev.type === "bank_zone_confiscation";
	          		});
	          		let recentEl = document.getElementById("recent__"+curr_persona_name_os);
	          		if (recentEl) recentEl.innerHTML = summarizeBridgeRecent(p["recent"]);
	          		if (hasBankPenalty) {
	          			if (role_titles[curr_persona_name]) {
	          				role_titles[curr_persona_name].setText((role_content || roleTitleFromName(curr_persona_name)) + " !PENALTY");
	          				role_titles[curr_persona_name].setColor("#ff6b8a");
	          			}
	          			let currActionEl = document.getElementById("current_action__"+curr_persona_name_os);
	          			if (currActionEl) currActionEl.innerHTML = "bank_penalty_confiscated";
	          		} else if (role_titles[curr_persona_name]) {
	          			role_titles[curr_persona_name].setColor("#f3f4f6");
	          		}
	          		let storedRow = document.getElementById("stored_row__"+curr_persona_name_os);
	          		if (storedRow) {
	          			let hsNum = Number(p["home_storage"] || 0);
	          			storedRow.style.display = (hsNum > 1e-12) ? "block" : "none";
	          		}
	          		let locEl = document.getElementById("location__"+curr_persona_name_os);
	          		if (locEl) {
	          			let dz = (p["dest_zone"] !== undefined && p["dest_zone"] !== null && String(p["dest_zone"]).length) ? String(p["dest_zone"]) : (split_desc[1] || "home");
	          			locEl.innerHTML = "(" + Math.round(tx) + ", " + Math.round(ty) + ") -> " + dz;
	          		}
	          	}
	          	updateBankPanelFromPersona(payload["persona"]);
	          }
	          pollBankTxDiagnosticsIfNeeded(false);
	          timer = timer_max;
	        }
	      });
	      bridge_xobj.send(JSON.stringify({"step": step, "sim_code": sim_code }));
	    }

	    // OBEDIENCE MODE: backend is movement authority. bridge_target[name] holds the
	    // latest server movement[] (pixel x,y). With BRIDGE_DIRECT_SPRITE_POSITION,
	    // the sprite is placed exactly there each frame (no client interpolation).
	    for (let i=0; i<Object.keys(personas).length; i++) {
	    	let name = Object.keys(personas)[i];
	    	let sprite = personas[name];
	    	let bubble = pronunciatios[name];
	    	let title = role_titles[name];

	    	let srv = bridge_target[name] || [sprite.x, sprite.y];
	    	if (BRIDGE_DIRECT_SPRITE_POSITION) {
	    		let prev = bridge_last_sprite_xy[name] || [sprite.x, sprite.y];
	    		sprite.setPosition(srv[0], srv[1]);
	    		let rdx = srv[0] - prev[0];
	    		let rdy = srv[1] - prev[1];
	    		bridge_last_sprite_xy[name] = [srv[0], srv[1]];
	    		if (Math.abs(rdx) + Math.abs(rdy) > 0.35) {
	    			if (Math.abs(rdx) >= Math.abs(rdy)) anims_direction = (rdx > 0) ? "r" : "l";
	    			else anims_direction = (rdy > 0) ? "d" : "u";
	    			pre_anims_direction_dict[name] = anims_direction;
	    			if (anims_direction == "l") sprite.anims.play("misa-left-walk", true);
	    			else if (anims_direction == "r") sprite.anims.play("misa-right-walk", true);
	    			else if (anims_direction == "u") sprite.anims.play("misa-back-walk", true);
	    			else if (anims_direction == "d") sprite.anims.play("misa-front-walk", true);
	    		} else {
	    			sprite.anims.stop();
	    			if (pre_anims_direction_dict[name] == "l") sprite.setTexture("atlas", "misa-left");
	    			else if (pre_anims_direction_dict[name] == "r") sprite.setTexture("atlas", "misa-right");
	    			else if (pre_anims_direction_dict[name] == "u") sprite.setTexture("atlas", "misa-back");
	    			else if (pre_anims_direction_dict[name] == "d") sprite.setTexture("atlas", "misa-front");
	    		}
	    	} else {
	    		let dx = srv[0] - sprite.x;
	    		let dy = srv[1] - sprite.y;
	    		let dist = Math.sqrt((dx * dx) + (dy * dy));
	    		if (dist > 0.25) {
	    			let step;
	    			if (dist > 128) { step = dist; }
	    			else { step = Math.min(bridge_steady_step, dist); }
	    			let nx = sprite.x + (dx / dist) * step;
	    			let ny = sprite.y + (dy / dist) * step;
	    			sprite.setPosition(nx, ny);
	    			if (Math.abs(dx) >= Math.abs(dy)) anims_direction = (dx > 0) ? "r" : "l";
	    			else anims_direction = (dy > 0) ? "d" : "u";
	    			pre_anims_direction_dict[name] = anims_direction;
	    			if (anims_direction == "l") sprite.anims.play("misa-left-walk", true);
	    			else if (anims_direction == "r") sprite.anims.play("misa-right-walk", true);
	    			else if (anims_direction == "u") sprite.anims.play("misa-back-walk", true);
	    			else if (anims_direction == "d") sprite.anims.play("misa-front-walk", true);
	    		} else {
	    			sprite.anims.stop();
	    			if (pre_anims_direction_dict[name] == "l") sprite.setTexture("atlas", "misa-left");
	    			else if (pre_anims_direction_dict[name] == "r") sprite.setTexture("atlas", "misa-right");
	    			else if (pre_anims_direction_dict[name] == "u") sprite.setTexture("atlas", "misa-back");
	    			else if (pre_anims_direction_dict[name] == "d") sprite.setTexture("atlas", "misa-front");
	    		}
	    	}
	    	bubble.x = sprite.x - 6;
	    	bubble.y = sprite.y - 42 - 32;
	    	if (title) {
	    		title.x = sprite.x;
	    		title.y = sprite.y - 78 - 32;
	    	}
	    	let tl = bridge_trace_labels[name];
	    	if (tl) {
	    		let goalPt = bridge_destination[name] || [sprite.x, sprite.y];
	    		let err = Math.round(Math.hypot(sprite.x - goalPt[0], sprite.y - goalPt[1]));
	    		let srvLine = bridge_last_srv_line[name] || "";
	    		tl.setText(srvLine + "\ncli " + Math.round(sprite.x) + "," + Math.round(sprite.y) + " err " + err);
	    		tl.x = sprite.x;
	    		tl.y = sprite.y - 96 - 32;
	    	}
	    }

	    timer = timer - 1;
	    return;
	  }

	  // console.log("phase: " + phase + ", step: " + step);
	  // *** MOVE PERSONAS ***
	  // Moving personas take place in three distinct phases: "process," "update,"
	  // and "execute." These phases are determined by the value of <phase>. 
	  // Only one of the three phases is incurred in each update cycle. 
	  if (phase == "process") {
	    // "process" takes all current locations of the personas and send them to
	    // the frontend server in a json form. Here, we first create the json 
	    // file that records all persona locations: 
	    let data = {"step": step, 
	    						"sim_code": sim_code,
	                "environment": {}}
	    for (let i=0; i<Object.keys(personas).length; i++) {
	      let persona_name = Object.keys(personas)[i];
	      data["environment"][persona_name] = {"maze": curr_maze,
	                                           "x": Math.ceil((personas[persona_name].body.position.x) / tile_width),
	                                           "y": Math.ceil((personas[persona_name].body.position.y) / tile_width)}
	    }
	    var json = JSON.stringify(data);
	    // We then send this to the frontend server: 
	    var retrieve_xobj = new XMLHttpRequest();
	    retrieve_xobj.overrideMimeType("application/json");
	    retrieve_xobj.open('POST', "{% url 'process_environment' %}", true);
	    retrieve_xobj.send(json);   
	    // Finally, we update the phase variable to start the "udpate" process. 
	    // Now that we sent all persona locations to the backend server, we need
	    // to wait until the backend determines what the personas will do next. 
	    phase = "update";
	  } 

	  else if (phase == "update") { 
	    // Update is where we * wait * for the backend server to finish 
	    // computing about what the personas will do next given their current 
	    // situation. 
	    // We do this by continuously asking the backend server if it is ready. 
	    // The backend server is ready when it returns a json that has a key-val
	    // pair with "<move>": true.
	    // Note that we do not want to overburden the backend too much by 
	    // over-querying; so, we have a timer set so we only query it once every
	    // timer_max cycles. 
	    if (timer <= 0) {
	      var update_xobj = new XMLHttpRequest();
	      update_xobj.overrideMimeType("application/json");
	      update_xobj.open('POST', "{% url 'update_environment' %}", true);
	      update_xobj.addEventListener("load", function() {
	        if (this.readyState === 4) {
	          if (update_xobj.status === 200) {
	            if (JSON.parse(update_xobj.responseText)["<step>"] == step) {
	              execute_movement = JSON.parse(update_xobj.responseText)
	              phase = "execute";
	            }
	            timer = timer_max;
	          }
	        }
	      });
	      update_xobj.send(JSON.stringify({"step": step, "sim_code": sim_code }));   
	    }
	    timer = timer - 1; 
	  } 

	  else { 
	    // This is where we actually move the personas in the visual world. Each
	    // backend computation in execute_movement moves each persona by one tile
	    // (or some personas might not move if they choose not to). 
	    // The execute_count_max is computed by tile_width/movement_speed, which
	    // defines a one step sequence in this world. 
	    document.getElementById("game-time-content").innerHTML = execute_movement["meta"]["curr_time"];
	    for (let i=0; i<Object.keys(personas).length; i++) {
	      let curr_persona_name = Object.keys(personas)[i];
	      let curr_persona = personas[curr_persona_name];
	      let curr_pronunciatio = pronunciatios[Object.keys(personas)[i]];
	      let curr_role_title = role_titles[Object.keys(personas)[i]];

	      if (execute_count == execute_count_max) { 
	        let curr_x = execute_movement["persona"][curr_persona_name]["movement"][0];
	        let curr_y = execute_movement["persona"][curr_persona_name]["movement"][1];
	        movement_target[curr_persona_name] = [curr_x * tile_width, 
	                                              curr_y * tile_width]; 
	        pronunciatios[curr_persona_name].setText(roleTitleFromName(curr_persona_name));
	        if (curr_role_title) curr_role_title.setText(roleTitleFromName(curr_persona_name));
	      }

	      console.log(curr_persona_name);
	      if (execute_count > 0) {
	        if (curr_persona.body.x < movement_target[curr_persona_name][0]) {
	          curr_persona.body.x += movement_speed; 
	          anims_direction = "r";
	          pre_anims_direction = "r"
	          pre_anims_direction_dict[curr_persona_name] = "r"
	        } else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {
	          curr_persona.body.x -= movement_speed; 
	          anims_direction = "l";
	          pre_anims_direction = "l"
	          pre_anims_direction_dict[curr_persona_name] = "l"
	        } else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
	          curr_persona.body.y += movement_speed;
	          anims_direction = "d";
	          pre_anims_direction = "d"
	          pre_anims_direction_dict[curr_persona_name] = "d"
	        } else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
	          curr_persona.body.y -= movement_speed;
	          anims_direction = "u";
	          pre_anims_direction = "u"
	          pre_anims_direction_dict[curr_persona_name] = "u"
	        } else {
	        	anims_direction = "";
	        }

	        curr_pronunciatio.x = curr_persona.body.x - 6; 
          curr_pronunciatio.y = curr_persona.body.y - 42 - 32; // DEBUG 1 --- I added 32 offset on Dec 29. 
          if (curr_role_title) {
          	curr_role_title.x = curr_persona.body.x;
          	curr_role_title.y = curr_persona.body.y - 78 - 32;
          }

          if (anims_direction == "l") {
			      curr_persona.anims.play("misa-left-walk", true);
			    } else if (anims_direction == "r") {
			      curr_persona.anims.play("misa-right-walk", true);
			    } else if (anims_direction == "u") {
			      curr_persona.anims.play("misa-back-walk", true);
			    } else if (anims_direction == "d") {
			      curr_persona.anims.play("misa-front-walk", true);
			    } else {
			      curr_persona.anims.stop();

			      // If we were moving, pick an idle frame to use
			      if (pre_anims_direction_dict[curr_persona_name] == "l") curr_persona.setTexture("atlas", "misa-left");else
			      if (pre_anims_direction_dict[curr_persona_name] == "r") curr_persona.setTexture("atlas", "misa-right");else
			      if (pre_anims_direction_dict[curr_persona_name] == "u") curr_persona.setTexture("atlas", "misa-back");else
			      if (pre_anims_direction_dict[curr_persona_name] == "d") curr_persona.setTexture("atlas", "misa-front");
			    };

	      } 
	      else {
	        // Once we are done moving the personas, we move on to the "process"
	        // stage where we will send the current locations of all personas at the
	        // end of the movemments to the frontend server, and then the backend.
	        for (let i=0; i<Object.keys(personas).length; i++) {
	          let curr_persona_name = Object.keys(personas)[i]
	          let curr_persona = personas[curr_persona_name];
	          curr_persona.body.x = movement_target[curr_persona_name][0];
	          curr_persona.body.y = movement_target[curr_persona_name][1];
	        }
	        phase = "process";
	        execute_count = execute_count_max + 1;
	        step = step + 1;
	      }
	    }

	    // Filling in the action description. 
	    if (execute_count == execute_count_max) { 
	      for (let i=0; i<Object.keys(personas).length; i++) {
	      	let action_description = ""
	        let curr_persona_name = Object.keys(personas)[i];
	        let curr_persona_name_os = curr_persona_name.replace(/ /g,"_");
	        let description_content = execute_movement["persona"][curr_persona_name]["description"];
	        let chat_content = ""

	        if (execute_movement["persona"][curr_persona_name]["chat"] != null ){
		        for (let j=0; j<execute_movement["persona"][curr_persona_name]["chat"].length; j++) { 
		        	chat_content += execute_movement["persona"][curr_persona_name]["chat"][j][0] + ": " + execute_movement["persona"][curr_persona_name]["chat"][j][1] + "<br>"
		        }
		      } else {
		      	chat_content = "<em>None at the moment</em>"
		      }
	        // action_description += description_content + "<br>";

	        let actionEl = document.getElementById("current_action__"+curr_persona_name_os);
	        if (actionEl) actionEl.innerHTML = description_content.split("@")[0];
	        let locationEl = document.getElementById("location__"+curr_persona_name_os);
	        if (locationEl) locationEl.innerHTML = description_content.split("@")[1];
	        let chatEl = document.getElementById("chat__"+curr_persona_name_os);
	        if (chatEl) chatEl.innerHTML = chat_content;
	      }
	      
	    }

	    execute_count = execute_count - 1;
	  }
	}

	// Control button binders
	var play_button=document.getElementById("play_button");
	var pause_button=document.getElementById("pause_button");
var demo_cycle_button=document.getElementById("demo_cycle_button");
var demo_cycle_status=document.getElementById("demo_cycle_status");
var bank_reset_button=document.getElementById("bank_reset_button");
var bank_reset_status=document.getElementById("bank_reset_status");
	var game;

if (demo_cycle_button) {
	demo_cycle_button.onclick = function() {
		demo_cycle_button.disabled = true;
		if (demo_cycle_status) demo_cycle_status.innerHTML = "Running scenario...";
		var req = new XMLHttpRequest();
		req.overrideMimeType("application/json");
		req.open("POST", "{% url 'bridge_force_cop_cycle' %}?steps=40", true);
		req.addEventListener("load", function() {
			demo_cycle_button.disabled = false;
			try {
				let payload = JSON.parse(req.responseText || "{}");
				if (req.status === 200 && payload.ok) {
					if (demo_cycle_status) demo_cycle_status.innerHTML = "Scenario started.";
				} else {
					if (demo_cycle_status) demo_cycle_status.innerHTML = "Scenario failed.";
				}
			} catch (e) {
				if (demo_cycle_status) demo_cycle_status.innerHTML = "Scenario failed.";
			}
		});
		req.addEventListener("error", function() {
			demo_cycle_button.disabled = false;
			if (demo_cycle_status) demo_cycle_status.innerHTML = "Scenario failed.";
		});
		req.send("{}");
	};
}

if (bank_reset_button) {
	bank_reset_button.onclick = function() {
		bank_reset_button.disabled = true;
		if (bank_reset_status) bank_reset_status.innerHTML = "Resetting baseline economy...";
		var req = new XMLHttpRequest();
		req.overrideMimeType("application/json");
		req.open("POST", "{% url 'bridge_reset_economy' %}", true);
		req.addEventListener("load", function() {
			bank_reset_button.disabled = false;
			try {
				let payload = JSON.parse(req.responseText || "{}");
				if (req.status === 200 && payload.ok) {
					if (bank_reset_status) bank_reset_status.innerHTML = "Reset complete: baseline population restored.";
					if (demo_cycle_status) demo_cycle_status.innerHTML = "Ready";
					resetFinanceCardsToZero();
					pollBankTxDiagnosticsIfNeeded(true);
				} else {
					if (bank_reset_status) bank_reset_status.innerHTML = "Reset failed.";
				}
			} catch (e) {
				if (bank_reset_status) bank_reset_status.innerHTML = "Reset failed.";
			}
		});
		req.addEventListener("error", function() {
			bank_reset_button.disabled = false;
			if (bank_reset_status) bank_reset_status.innerHTML = "Reset failed.";
		});
		req.send("{}");
	};
}

pollBankTxDiagnosticsIfNeeded(true);

	// FORCE PHASER START (engine-only test): no async boot, no spawn guards.
	console.log("FORCING PHASER START");
	game = new Phaser.Game(config);
</script>
